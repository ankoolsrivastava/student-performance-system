<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile | Academic Center</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --first-color: hsl(263, 64%, 48%);
        --bg-color: #f4f7fe;
        --card-bg: #ffffff;
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --border-color: #eef2f6;
        --body-font: "Inter", sans-serif;
        --error-color: #ef4444;
      }

      [data-theme="dark"] {
        --bg-color: #0b0f19;
        --card-bg: #1a1f2e;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #2a3142;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--body-font);
        background: var(--bg-color);
        color: var(--text-main);
        padding-bottom: 40px;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .container {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 24px;
        align-items: start;
      }

      /* Back Button */
      .back-btn {
        grid-column: 1/-1;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--body-font);
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-main);
        transition: 0.2s;
        width: fit-content;
      }
      .back-btn:hover {
        background: var(--first-color);
        color: white;
        border-color: var(--first-color);
      }

      .card {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      }

      h2,
      h3 {
        font-weight: 700;
        color: var(--text-main);
      }
      h2 {
        margin-bottom: 16px;
        font-size: 1.5rem;
      }
      h3 {
        margin-bottom: 20px;
        font-size: 1.25rem;
      }

      /* Profile Sidebar Info */
      .profile-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
      }
      .profile-header img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border-color);
        background: var(--bg-color);
      }

      .profile-list p {
        display: flex;
        justify-content: space-between;
        padding: 14px 0;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.95rem;
      }
      .profile-list p:last-child {
        border-bottom: none;
      }
      .profile-list b {
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
      }
      .profile-list span {
        font-weight: 600;
        text-align: right;
        color: var(--text-main);
      }

      /* Table Styles */
      .table-container {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 16px;
        text-align: left;
      }
      th {
        background: var(--bg-color);
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 10;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      td {
        border-bottom: 1px solid var(--border-color);
        font-size: 0.95rem;
        font-weight: 500;
      }
      .failed {
        color: var(--error-color) !important;
        font-weight: 700;
        background: rgba(239, 68, 68, 0.1);
        padding: 4px 8px;
        border-radius: 6px;
      }
      .end-sem-col {
        font-weight: 700 !important;
        background: rgba(106, 125, 227, 0.05);
      }

      .chart-container {
        position: relative;
        width: 100%;
        height: 300px;
      }

      @media (max-width: 850px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <button class="back-btn" onclick="goBack()">
        <i class="ri-arrow-left-line"></i> Back to Students
      </button>

      <div class="card profile-list">
        <div class="profile-header">
          <img id="studentPhoto" src="" alt="Profile Photo" />
          <div>
            <h2 id="studentName" style="margin: 0">Loading...</h2>
            <p
              style="
                border: none;
                padding: 0;
                margin-top: 5px;
                color: var(--text-muted);
              "
            >
              <i class="ri-id-card-line"></i>
              <span id="rollBadge" style="color: var(--text-muted)">—</span>
            </p>
          </div>
        </div>
        <p><b>Roll Number</b> <span id="roll">—</span></p>
        <p>
          <b>Blood Group</b>
          <span id="blood_group" style="color: #ef4444">—</span>
        </p>
        <p><b>Department</b> <span id="dept">—</span></p>
        <p><b>Year</b> <span id="year">—</span></p>
        <p><b>Email</b> <span id="email">—</span></p>
        <p><b>Phone</b> <span id="phone">—</span></p>
        <p><b>Date of Birth</b> <span id="dob">—</span></p>
        <p><b>Guardian</b> <span id="parent">—</span></p>
        <p><b>Guardian Phone</b> <span id="parentPhone">—</span></p>
        <p style="flex-direction: column; gap: 8px">
          <b>Address</b> <span id="address" style="text-align: left">—</span>
        </p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 24px">
        <div class="card">
          <h3>Academic Record</h3>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th style="width: 40%">Subject</th>
                  <th style="text-align: center">UT 1</th>
                  <th style="text-align: center">UT 2</th>
                  <th style="text-align: center">End Sem</th>
                </tr>
              </thead>
              <tbody id="marksTable">
                <tr>
                  <td
                    colspan="4"
                    style="text-align: center; color: var(--text-muted)"
                  >
                    Fetching data...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px">
          <div
            class="card"
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              text-align: center;
            "
          >
            <h3
              style="
                margin-bottom: 10px;
                color: var(--text-muted);
                font-size: 1rem;
                text-transform: uppercase;
              "
            >
              Overall Average
            </h3>
            <div
              style="
                font-size: 3.5rem;
                font-weight: 800;
                color: var(--first-color);
                line-height: 1;
              "
              id="avgMarks"
            >
              0
            </div>
            <div
              style="
                color: var(--text-muted);
                font-size: 0.9rem;
                margin-top: 10px;
                font-weight: 600;
              "
            >
              Percentage (%)
            </div>
          </div>

          <div class="card">
            <h3>Performance Chart</h3>
            <div class="chart-container">
              <canvas id="marksChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Apply correct theme from dashboard
      const theme = localStorage.getItem("dashboard_theme") || "light";
      document.body.setAttribute("data-theme", theme);

      const params = new URLSearchParams(window.location.search);
      const studentId = params.get("id");
      let marksChartInstance = null;

      async function loadStudent() {
        if (!studentId) return;
        try {
          const res = await fetch(
            `http://localhost:5000/api/students/${studentId}`,
          );
          if (!res.ok) throw new Error("Failed to fetch");

          const student = await res.json();

          document.getElementById("studentName").innerText =
            student.name || "Unknown";
          document.getElementById("roll").innerText =
            student.roll_number || "N/A";
          document.getElementById("rollBadge").innerText =
            student.roll_number || "N/A";
          document.getElementById("email").innerText = student.email || "N/A";
          document.getElementById("phone").innerText = student.phone || "N/A";
          document.getElementById("parent").innerText =
            student.parent_name || "N/A";
          document.getElementById("parentPhone").innerText =
            student.parent_phone || "N/A";
          document.getElementById("address").innerText =
            student.address || "N/A";
          document.getElementById("dept").innerText =
            student.department || "N/A";
          document.getElementById("year").innerText = student.year || "N/A";

          // New Blood Group Field
          document.getElementById("blood_group").innerText =
            student.blood_group || "N/A";

          if (student.date_of_birth) {
            const date = new Date(student.date_of_birth);
            document.getElementById("dob").innerText =
              date.toLocaleDateString("en-GB");
          }

          document.getElementById("studentPhoto").src =
            `https://ui-avatars.com/api/?name=${encodeURIComponent(student.name)}&background=6a7de3&color=fff&size=128`;
        } catch (err) {
          console.error(err);
        }
      }

      async function loadMarks() {
        if (!studentId) return;
        try {
          const res = await fetch(
            `http://localhost:5000/api/analysis/report/${studentId}`,
          );
          const data = await res.json();

          const subjectMap = {};

          data.forEach((m) => {
            const subName = m.subject_name;
            if (!subjectMap[subName])
              subjectMap[subName] = { ut1: "-", ut2: "-", end: "-" };

            const type = m.exam_type
              ? m.exam_type.toLowerCase().replace(/\s/g, "")
              : "";
            if (type.includes("test1") || type === "ut1")
              subjectMap[subName].ut1 = m.marks;
            if (type.includes("test2") || type === "ut2")
              subjectMap[subName].ut2 = m.marks;
            if (type.includes("end") || type === "final")
              subjectMap[subName].end = m.marks;
          });

          let html = "";
          const subjects = Object.keys(subjectMap);
          const chartScores = [];

          if (subjects.length === 0) {
            html = `<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-muted);">No marks recorded for this student yet.</td></tr>`;
          } else {
            subjects.forEach((name) => {
              const m = subjectMap[name];
              const formatScore = (val) =>
                val < 40 && val !== "-"
                  ? `<span class="failed">${val}</span>`
                  : val;

              html += `
                <tr>
                  <td style="color: var(--first-color); font-weight: 700;">${name}</td>
                  <td style="text-align: center;">${formatScore(m.ut1)}</td>
                  <td style="text-align: center;">${formatScore(m.ut2)}</td>
                  <td class="end-sem-col" style="text-align: center;">${formatScore(m.end)}</td>
                </tr>`;

              // Chart logic: take the highest level of exam completed
              let bestScore = 0;
              if (m.end !== "-") bestScore = m.end;
              else if (m.ut2 !== "-") bestScore = m.ut2;
              else if (m.ut1 !== "-") bestScore = m.ut1;
              chartScores.push(bestScore);
            });
          }

          document.getElementById("marksTable").innerHTML = html;

          // Average Calculation
          const allNums = data.map((m) => m.marks).filter((n) => !isNaN(n));
          const avg = allNums.length
            ? allNums.reduce((a, b) => a + b, 0) / allNums.length
            : 0;
          document.getElementById("avgMarks").innerText = avg.toFixed(1);

          if (subjects.length > 0) renderChart(subjects, chartScores);
        } catch (err) {
          console.error(err);
        }
      }

      function renderChart(labels, data) {
        const isDark = document.body.getAttribute("data-theme") === "dark";
        const gridColor = isDark
          ? "rgba(255, 255, 255, 0.05)"
          : "rgba(0, 0, 0, 0.05)";
        const textColor = isDark ? "#94a3b8" : "#a3aed1";

        const ctx = document.getElementById("marksChart").getContext("2d");
        if (marksChartInstance) marksChartInstance.destroy();

        marksChartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Performance %",
                data: data,
                backgroundColor: "hsl(263, 64%, 48%)", // Matches theme primary color
                borderRadius: 6,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: textColor, font: { family: "Inter" } },
              },
              y: {
                grid: { color: gridColor, borderDash: [5, 5] },
                ticks: { color: textColor, font: { family: "Inter" } },
                beginAtZero: true,
                max: 100,
              },
            },
          },
        });
      }

      function goBack() {
        window.location.href = "students.html";
      }

      loadStudent();
      loadMarks();
    </script>
  </body>
</html>
