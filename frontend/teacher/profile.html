<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Teacher Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap");

      :root {
        --first-color: hsl(263, 64%, 48%);
        --first-color-alt: hsl(263, 64%, 44%);

        /* Light Theme */
        --bg-color: #f4f7fe;
        --card-bg: #ffffff;
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --border-color: #e2e8f0;
        --cover-gradient: linear-gradient(
          135deg,
          hsl(263, 64%, 48%) 0%,
          hsl(263, 64%, 65%) 100%
        );

        --body-font: "Syne", sans-serif;
      }

      /* Dark Theme */
      [data-theme="dark"] {
        --bg-color: #0b0f19;
        --card-bg: #1a1f2e;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #2a3142;
        --cover-gradient: linear-gradient(
          135deg,
          hsl(263, 64%, 30%) 0%,
          hsl(263, 64%, 15%) 100%
        );
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      /* Top Navigation Bar */
      .navbar {
        width: 100%;
        max-width: 1200px;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
      }

      .back-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.1rem;
        font-family: var(--body-font);
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: color 0.3s;
      }

      .back-btn:hover {
        color: var(--first-color);
      }

      .theme-btn {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-family: var(--body-font);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .theme-btn:hover {
        border-color: var(--first-color);
        color: var(--first-color);
      }

      /* Profile Container */
      .profile-container {
        width: 100%;
        max-width: 800px;
        background: var(--card-bg);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        margin-top: 20px;
        border: 1px solid var(--border-color);
        transition:
          background-color 0.3s,
          border-color 0.3s;
      }

      /* Cover & Avatar Area */
      .profile-header {
        position: relative;
        height: 150px;
        background: var(--cover-gradient);
      }

      .profile-avatar-wrapper {
        position: absolute;
        bottom: -50px;
        left: 40px;
        background: var(--card-bg);
        padding: 6px;
        border-radius: 50%;
        transition: background-color 0.3s;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        display: block;
      }

      /* Profile Body */
      .profile-body {
        padding: 60px 40px 40px 40px;
      }

      .profile-name {
        font-family: var(--body-font);
        font-size: 2rem;
        color: var(--text-main);
        margin-bottom: 5px;
      }

      .profile-designation {
        color: var(--first-color);
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Information Grid */
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
        padding-bottom: 30px;
        border-bottom: 1px solid var(--border-color);
      }

      .info-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .info-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .info-value {
        color: var(--text-main);
        font-size: 1.05rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-value i {
        color: var(--text-muted);
      }

      /* Subjects Tags */
      .subjects-section {
        margin-bottom: 40px;
      }

      .subjects-title {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 15px;
      }

      .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tag {
        background: var(--bg-color);
        color: var(--text-main);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: 500;
        border: 1px solid var(--border-color);
      }

      /* Action Buttons */
      .actions {
        display: flex;
        gap: 15px;
      }

      .btn {
        padding: 12px 25px;
        border-radius: 10px;
        font-family: var(--body-font);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s ease;
        border: none;
      }

      .btn-primary {
        background: var(--first-color);
        color: white;
        flex: 1;
      }

      .btn-primary:hover {
        background: var(--first-color-alt);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(106, 125, 227, 0.3);
      }

      .btn-outline {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        flex: 1;
      }

      .btn-outline:hover {
        background: var(--bg-color);
        border-color: var(--text-muted);
      }

      @media (max-width: 600px) {
        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <button
        class="back-btn"
        onclick="window.location.href = 'dashboard.html'"
      >
        <i class="ri-arrow-left-line"></i> Back to Dashboard
      </button>
      <button class="theme-btn" id="themeToggle">
        <i class="ri-moon-line" id="themeIcon"></i> Theme
      </button>
    </nav>

    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-avatar-wrapper">
          <img
            id="profileImg"
            class="profile-avatar"
            src=""
            alt="Teacher Profile"
          />
        </div>
      </div>

      <div class="profile-body">
        <h2 class="profile-name" id="profileName">Loading...</h2>
        <p class="profile-designation" id="profileDesignation">
          <i class="ri-briefcase-4-fill"></i> Assistant Professor
        </p>

        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Email Address</span>
            <span class="info-value"
              ><i class="ri-mail-line"></i>
              <span id="profileEmail">loading...</span></span
            >
          </div>
          <div class="info-item">
            <span class="info-label">Phone Number</span>
            <span class="info-value"
              ><i class="ri-phone-line"></i>
              <span id="profilePhone">+91 98765 43210</span></span
            >
          </div>
          <div class="info-item">
            <span class="info-label">Department</span>
            <span class="info-value"
              ><i class="ri-building-4-line"></i>
              <span id="profileDept">Computer Science</span></span
            >
          </div>
          <div class="info-item">
            <span class="info-label">Employee ID</span>
            <span class="info-value"
              ><i class="ri-id-card-line"></i>
              <span id="profileEmpId">EMP-2023-45</span></span
            >
          </div>
          <div class="info-item">
            <span class="info-label">Qualifications</span>
            <span class="info-value"
              ><i class="ri-graduation-cap-line"></i>
              <span id="profileQual"
                >Ph.D. in Computer Science, M.Tech</span
              ></span
            >
          </div>
          <div class="info-item">
            <span class="info-label">Date Joined</span>
            <span class="info-value"
              ><i class="ri-calendar-line"></i>
              <span id="profileDate">August 15, 2018</span></span
            >
          </div>
        </div>

        <div class="subjects-section">
          <h3 class="subjects-title">Assigned Subjects</h3>
          <div class="tags-container" id="subjectsContainer">
            <span class="tag">Database Systems</span>
            <span class="tag">Operating Systems</span>
            <span class="tag">Data Structures</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-outline" onclick="changePassword()">
            <i class="ri-lock-password-line"></i> Change Password
          </button>
          <button class="btn btn-primary" onclick="editProfile()">
            <i class="ri-edit-box-line"></i> Edit Profile
          </button>
        </div>
      </div>
    </div>

    <script>
      /* ================= THEME ================= */

      const themeBtn = document.getElementById("themeToggle");
      const themeIcon = document.getElementById("themeIcon");

      let theme = localStorage.getItem("dashboard_theme") || "light";

      function applyTheme(t) {
        document.body.setAttribute("data-theme", t);

        if (t === "dark") {
          themeIcon.className = "ri-sun-line";
        } else {
          themeIcon.className = "ri-moon-line";
        }
      }

      applyTheme(theme);

      themeBtn.onclick = () => {
        theme = theme === "light" ? "dark" : "light";
        localStorage.setItem("dashboard_theme", theme);
        applyTheme(theme);
      };

      /* ================= LOGIN CHECK ================= */

      const teacher = JSON.parse(localStorage.getItem("teacher") || "{}");

      if (!teacher || !teacher.teacher_id) {
        window.location.href = "login.html";
      }

      /* ================= BASIC PROFILE ================= */

      const teacherId = teacher.teacher_id;
      const teacherName = teacher.name || "Teacher";
      const teacherEmail = teacher.email || "No Email";

      document.getElementById("profileName").innerText = teacherName;
      document.getElementById("profileEmail").innerText = teacherEmail;

      /* ================= PROFILE IMAGE ================= */

      const profileImg = document.getElementById("profileImg");

      /* fallback avatar */
      profileImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(teacherName)}&background=6a7de3&color=fff&size=200`;

      /* ================= LOAD TEACHER PROFILE ================= */

      async function loadTeacherProfile() {
        try {
          const res = await fetch(
            `http://localhost:5000/api/teachers/${teacherId}`,
          );

          if (!res.ok) {
            console.log("Teacher API not found");
            return;
          }

          const data = await res.json();

          /* PROFILE IMAGE */

          if (data.profile_image) {
            profileImg.src = `http://localhost:5000/uploads/teachers/${data.profile_image}`;
          } else {
            profileImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}`;
          }

          /* PROFILE DETAILS */

          if (data.phone)
            document.getElementById("profilePhone").innerText = data.phone;

          if (data.department)
            document.getElementById("profileDept").innerText = data.department;

          if (data.employee_id)
            document.getElementById("profileEmpId").innerText =
              data.employee_id;

          if (data.qualifications)
            document.getElementById("profileQual").innerText =
              data.qualifications;

          if (data.designation) {
            document.getElementById("profileDesignation").innerHTML =
              `<i class="ri-briefcase-4-fill"></i> ${data.designation}`;
          }

          if (data.join_date) {
            const date = new Date(data.join_date);
            document.getElementById("profileDate").innerText =
              date.toLocaleDateString();
          }
        } catch (err) {
          console.log("Profile loading error", err);
        }
      }

      /* ================= LOAD SUBJECTS ================= */

      async function loadTeacherSubjects() {
        try {
          const res = await fetch(
            `http://localhost:5000/api/teachers/${teacherId}/subjects`,
          );

          if (!res.ok) {
            console.log("Subjects API missing");
            return;
          }

          const subjects = await res.json();

          const container = document.getElementById("subjectsContainer");

          container.innerHTML = "";

          if (subjects.length === 0) {
            container.innerHTML = `<span class="tag" style="border:dashed 1px var(--border-color);color:var(--text-muted)">
No subjects assigned
</span>`;

            return;
          }

          subjects.forEach((sub) => {
            const subjectName = sub.subject_name || sub.name;

            container.innerHTML += `<span class="tag">${subjectName}</span>`;
          });
        } catch (err) {
          console.log("Subjects error", err);
        }
      }

      /* ================= PAGE LOAD ================= */

      loadTeacherProfile();
      loadTeacherSubjects();

      /* ================= BUTTON ACTIONS ================= */

      function editProfile() {
        window.location.href = "edit-teacher-profile.html";
      }

      function changePassword() {
        alert("Password change feature coming soon");
      }

      /* ================= ANIMATION ================= */

      window.addEventListener("DOMContentLoaded", () => {
        const tl = gsap.timeline();

        tl.from(".navbar", { y: -20, opacity: 0, duration: 0.5 })
          .from(
            ".profile-container",
            { y: 40, opacity: 0, duration: 0.6 },
            "-=0.2",
          )
          .from(".profile-avatar", { scale: 0, duration: 0.5 }, "-=0.3")
          .from(".info-item", { y: 20, opacity: 0, stagger: 0.05 }, "-=0.2");
      });
    </script>
  </body>
</html>
