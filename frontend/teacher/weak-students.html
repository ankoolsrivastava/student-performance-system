<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weak Students Analysis</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      body {
        font-family: "Inter", Arial, sans-serif;
        background: #f4f7fe;
        padding: 40px;
        color: #2b3674;
        margin: 0;
      }
      .container {
        max-width: 1100px;
        margin: auto;
      }
      h2 {
        font-weight: 700;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      th,
      td {
        padding: 16px;
        border-bottom: 1px solid #eef2f6;
        text-align: left;
      }
      th {
        background: #6a7de3;
        color: white;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
      }
      /* Header colors for different phases */
      .th-ut1 {
        background: #f59e0b;
      } /* Orange */
      .th-ut2 {
        background: #ec4899;
      } /* Pink */
      .th-end {
        background: #ef4444;
      } /* Red */

      tr:last-child td {
        border-bottom: none;
      }

      .btn-back {
        margin-bottom: 20px;
        padding: 10px 20px;
        background: white;
        color: #6a7de3;
        border: 1px solid #6a7de3;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
      }
      .btn-back:hover {
        background: #6a7de3;
        color: white;
      }

      .fail-item {
        color: #ef4444;
        font-weight: 600;
        background: rgba(239, 68, 68, 0.08);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 6px;
        display: block;
        border: 1px solid rgba(239, 68, 68, 0.1);
      }
      .empty-cell {
        color: #cbd5e1;
        font-style: italic;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>

      <h2>
        Weak Students Analysis
        <span style="font-size: 0.9rem; font-weight: 400; color: #a3aed1"
          >Threshold: Marks < 40</span
        >
      </h2>

      <table>
        <thead>
          <tr>
            <th style="background: #2b3674">Student Identity</th>
            <th class="th-ut1" style="text-align: center">Unit Test 1</th>
            <th class="th-ut2" style="text-align: center">Unit Test 2</th>
            <th class="th-end" style="text-align: center">End Sem Exam</th>
          </tr>
        </thead>
        <tbody id="weakTableBody">
          <tr>
            <td colspan="4" style="text-align: center; padding: 40px">
              Analyzing academic records...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      async function loadWeakAnalysis() {
        try {
          // Using the detailed analysis endpoint
          const res = await fetch(
            "http://localhost:5000/api/analysis/weak-students",
          );
          const data = await res.json();

          let html = "";

          if (data.length === 0) {
            html = `<tr><td colspan="4" style="text-align:center; padding: 40px; color: #10b981; font-weight: 600;">Excellent! All students are above passing threshold.</td></tr>`;
          } else {
            data.forEach((s) => {
              // Helper function to extract failures by phase
              const getFailuresByPhase = (phase) => {
                const filtered = s.failures.filter((f) => f.type === phase);
                if (filtered.length === 0)
                  return '<span class="empty-cell">Clear</span>';

                return filtered
                  .map(
                    (f) => `
                  <div class="fail-item">
                    ${f.subject} <strong>(${f.marks})</strong>
                  </div>
                `,
                  )
                  .join("");
              };

              html += `
                <tr>
                  <td>
                    <div style="font-weight:700;">${s.name}</div>
                    <div style="font-size:0.75rem; color:#a3aed1;">Roll No: ${s.roll_number}</div>
                  </td>
                  <td style="text-align: center; vertical-align: top;">${getFailuresByPhase("Unit Test 1")}</td>
                  <td style="text-align: center; vertical-align: top;">${getFailuresByPhase("Unit Test 2")}</td>
                  <td style="text-align: center; vertical-align: top;">${getFailuresByPhase("End Sem")}</td>
                </tr>`;
            });
          }
          document.getElementById("weakTableBody").innerHTML = html;
        } catch (err) {
          console.error(err);
          document.getElementById("weakTableBody").innerHTML =
            `<tr><td colspan="4" style="color:#ef4444; text-align:center; padding: 40px;">Error: Failed to fetch analysis data.</td></tr>`;
        }
      }

      // Initialize on load
      loadWeakAnalysis();
    </script>
  </body>
</html>
