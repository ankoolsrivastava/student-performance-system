<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance - Teacher Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --first-color: hsl(263, 64%, 48%);
        --first-color-alt: hsl(263, 64%, 44%);
        --bg-color: #f4f7fe;
        --card-bg: #ffffff;
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --border-color: #eef2f6;
        --body-font: "Inter", sans-serif;
      }

      [data-theme="dark"] {
        --bg-color: #0b0f19;
        --card-bg: #1a1f2e;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #2a3142;
      }

      body {
        margin: 0;
        font-family: var(--body-font);
        background: var(--bg-color);
        color: var(--text-main);
        transition: 0.3s;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background: var(--first-color);
        color: white;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
        z-index: 20;
      }
      .sidebar h2 {
        text-align: center;
        padding: 30px 20px;
        font-size: 1.6rem;
        font-weight: 700;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
      }
      .sidebar a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        margin: 4px 16px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-weight: 500;
        border-radius: 10px;
        transition: 0.3s;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        transform: translateX(4px);
      }

      .main {
        flex: 1;
        padding: 30px 40px;
        overflow-y: auto;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .topbar h1 {
        font-size: 2rem;
        color: var(--text-main);
        font-weight: 700;
        margin: 0;
      }

      /* PROFILE */
      .profile-wrapper {
        position: relative;
      }
      .profile {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--card-bg);
        padding: 6px 16px 6px 6px;
        border-radius: 30px;
        border: 1px solid var(--border-color);
        font-weight: 600;
        cursor: pointer;
      }
      .profile img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
      }
      .dropdown {
        position: absolute;
        top: 120%;
        right: 0;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: 200px;
        padding: 10px 0;
        display: flex;
        flex-direction: column;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: 0.3s ease;
        z-index: 1001;
        border: 1px solid var(--border-color);
      }
      .dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .dropdown button {
        padding: 12px 20px;
        color: var(--text-main);
        background: none;
        border: none;
        text-align: left;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dropdown button:hover {
        background: var(--bg-color);
        color: var(--first-color);
      }

      /* TABS */
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
      }
      .tab-btn {
        background: none;
        border: none;
        font-family: var(--body-font);
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text-muted);
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.2s;
      }
      .tab-btn.active {
        background: var(--first-color);
        color: white;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* PANELS */
      .panel {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        margin-bottom: 24px;
      }
      .controls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        align-items: end;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .input-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .input-group input,
      .input-group select {
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background: var(--bg-color);
        color: var(--text-main);
        outline: none;
        font-family: var(--body-font);
      }
      .input-group input:focus,
      .input-group select:focus {
        border-color: var(--first-color);
      }

      .btn-primary {
        background: var(--first-color);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.2s;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ATTENDANCE TABLE */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 16px 12px;
        border-bottom: 1px solid var(--border-color);
        text-align: left;
      }
      th {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: 600;
      }

      .student-cell {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
      }
      .student-cell img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f1f5f9;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 54px;
        height: 28px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ef4444;
        transition: 0.4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #10b981;
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }

      .status-text {
        margin-left: 12px;
        font-weight: 700;
        font-size: 0.9rem;
      }
      .status-present {
        color: #10b981;
      }
      .status-absent {
        color: #ef4444;
      }

      .badge-defaulter {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 700;
        margin-left: 10px;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <div class="sidebar">
        <h2>Teacher</h2>
        <a href="dashboard.html"><i class="ri-dashboard-line"></i> Dashboard</a>
        <a href="students.html"><i class="ri-group-line"></i> Students</a>
        <a href="marks.html"><i class="ri-file-edit-line"></i> Marks Entry</a>
        <a href="attendance.html" class="active"
          ><i class="ri-calendar-check-fill"></i> Attendance</a
        >
        <a href="analysis.html"
          ><i class="ri-bar-chart-box-line"></i> Performance</a
        >
      </div>

      <div class="main">
        <header class="topbar">
          <h1>Attendance Management</h1>
          <div class="profile-wrapper">
            <div class="profile" id="profileBtn">
              <img id="profileImg" alt="P" />
              <span id="teacherName">Teacher</span>
              <i class="ri-arrow-down-s-line"></i>
            </div>
            <div class="dropdown" id="profileDropdown">
              <button id="themeToggle">
                <i class="ri-moon-line" id="themeIcon"></i> Toggle Theme
              </button>
              <button onclick="logout()">
                <i class="ri-logout-box-r-line"></i> Logout
              </button>
            </div>
          </div>
        </header>

        <div class="tabs">
          <button
            class="tab-btn active"
            onclick="switchTab('markTab')"
            id="btn-markTab"
          >
            Mark Attendance
          </button>
          <button
            class="tab-btn"
            onclick="switchTab('reportTab')"
            id="btn-reportTab"
          >
            Reports & Analytics
          </button>
        </div>

        <div id="markTab" class="tab-content active">
          <div class="panel">
            <div class="controls-grid">
              <div class="input-group">
                <label>Date</label>
                <input type="date" id="attendanceDate" />
              </div>
              <div class="input-group">
                <label>Department</label>
                <select id="deptSelect">
                  <option value="">All Departments</option>
                  <option value="Computer Engineering">
                    Computer Engineering
                  </option>
                  <option value="Information Technology">
                    Information Technology
                  </option>
                  <option value="Electronics">Electronics</option>
                </select>
              </div>
              <div class="input-group">
                <label>Year</label>
                <select id="yearSelect">
                  <option value="">All Years</option>
                  <option value="1">1st Year</option>
                  <option value="2">2nd Year</option>
                  <option value="3">3rd Year</option>
                  <option value="4">4th Year</option>
                </select>
              </div>
              <div class="input-group">
                <label>Subject</label>
                <select id="subjectSelectMark">
                  <option value="">Select Subject...</option>
                </select>
              </div>
              <button class="btn-primary" onclick="loadClassList()">
                <i class="ri-group-line"></i> Load Class
              </button>
            </div>
          </div>

          <div class="panel" id="attendancePanel" style="display: none">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
              "
            >
              <h3 style="margin: 0">Student Attendance</h3>
              <button
                class="btn-primary"
                style="
                  background: var(--bg-color);
                  color: var(--first-color);
                  border: 1px solid var(--border-color);
                "
                onclick="markAllPresent()"
              >
                Mark All Present
              </button>
            </div>
            <table>
              <thead>
                <tr>
                  <th style="width: 80px">#</th>
                  <th>Student Details</th>
                  <th style="width: 200px; text-align: center">Status</th>
                </tr>
              </thead>
              <tbody id="attendanceTbody"></tbody>
            </table>
            <div
              style="display: flex; justify-content: flex-end; margin-top: 25px"
            >
              <button
                class="btn-primary"
                id="saveBtn"
                onclick="saveAttendance()"
              >
                <i class="ri-save-line"></i> Save Attendance
              </button>
            </div>
          </div>
        </div>

        <div id="reportTab" class="tab-content">
          <div class="panel">
            <div class="controls-grid">
              <div class="input-group">
                <label>Subject Filter</label>
                <select id="subjectSelectReport">
                  <option value="">All Subjects</option>
                </select>
              </div>
              <div class="input-group">
                <label>Report Timeframe</label>
                <select id="timeFilter">
                  <option value="week">Past Week</option>
                  <option value="month">Past Month</option>
                  <option value="semester" selected>Entire Semester</option>
                </select>
              </div>
              <button class="btn-primary" onclick="fetchAttendanceReport()">
                <i class="ri-pie-chart-line"></i> Generate Report
              </button>
            </div>
          </div>

          <div class="panel" id="reportPanel" style="display: none">
            <h3>Attendance Standings</h3>
            <table>
              <thead>
                <tr>
                  <th>Roll No</th>
                  <th>Student Name</th>
                  <th>Present/Total</th>
                  <th>Percentage</th>
                  <th style="text-align: right">Action</th>
                </tr>
              </thead>
              <tbody id="reportTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* --- INITIAL SETUP --- */
      const theme = localStorage.getItem("dashboard_theme") || "light";
      document.body.setAttribute("data-theme", theme);
      document.getElementById("attendanceDate").valueAsDate = new Date();

      const teacher = JSON.parse(localStorage.getItem("teacher") || "{}");
      if (!teacher.name) window.location.href = "login.html";
      document.getElementById("teacherName").innerText = teacher.name;
      document.getElementById("profileImg").src =
        `https://ui-avatars.com/api/?name=${encodeURIComponent(teacher.name)}&background=6a7de3&color=fff&bold=true`;

      document.getElementById("profileBtn").onclick = (e) => {
        e.stopPropagation();
        document.getElementById("profileDropdown").classList.toggle("show");
      };
      window.onclick = () =>
        document.getElementById("profileDropdown").classList.remove("show");

      /* --- CORE FUNCTIONS --- */
      async function loadSubjects() {
        try {
          const res = await fetch(
            "http://localhost:5000/api/analysis/subjects",
          );
          const data = await res.json();
          const markSelect = document.getElementById("subjectSelectMark");
          const reportSelect = document.getElementById("subjectSelectReport");
          data.forEach((s) => {
            const opt = `<option value="${s.subject_id}">${s.subject_name}</option>`;
            markSelect.innerHTML += opt;
            reportSelect.innerHTML += opt;
          });
        } catch (e) {
          console.error(e);
        }
      }
      loadSubjects();

      function switchTab(id) {
        document
          .querySelectorAll(".tab-content, .tab-btn")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document.getElementById("btn-" + id).classList.add("active");
      }

      /* --- TAB 1: MARK ATTENDANCE --- */
      async function loadClassList() {
        const dept = document.getElementById("deptSelect").value;
        const year = document.getElementById("yearSelect").value;
        const sub = document.getElementById("subjectSelectMark").value;

        if (!sub) return alert("Please select a subject!");

        try {
          const res = await fetch("http://localhost:5000/api/students");
          let students = await res.json();

          // Filter on Frontend to keep server simple
          if (dept) students = students.filter((s) => s.department === dept);
          if (year) students = students.filter((s) => s.year == year);

          const tbody = document.getElementById("attendanceTbody");
          tbody.innerHTML = students
            .map(
              (s, idx) => `
            <tr>
              <td style="color: var(--text-muted); font-weight: 700;">${idx + 1}</td>
              <td>
                <div class="student-cell">
                  <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random&size=32">
                  <div>
                    <div style="font-weight: 700;">${s.name}</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">${s.roll_number}</div>
                  </div>
                </div>
              </td>
              <td style="text-align: center;">
                <div style="display: inline-flex; align-items: center;">
                  <label class="toggle-switch">
                    <input type="checkbox" checked class="att-check" data-id="${s.student_id}" onchange="updateToggleText(this, ${s.student_id})">
                    <span class="slider"></span>
                  </label>
                  <span id="txt_${s.student_id}" class="status-text status-present">Present</span>
                </div>
              </td>
            </tr>
          `,
            )
            .join("");

          document.getElementById("attendancePanel").style.display = "block";
          gsap.from("#attendanceTbody tr", {
            opacity: 0,
            x: -20,
            stagger: 0.05,
          });
        } catch (e) {
          alert("Failed to load students.");
        }
      }

      function updateToggleText(cb, id) {
        const span = document.getElementById("txt_" + id);
        span.innerText = cb.checked ? "Present" : "Absent";
        span.className = cb.checked
          ? "status-text status-present"
          : "status-text status-absent";
      }

      function markAllPresent() {
        document.querySelectorAll(".att-check").forEach((cb) => {
          cb.checked = true;
          updateToggleText(cb, cb.dataset.id);
        });
      }

      async function saveAttendance() {
        const date = document.getElementById("attendanceDate").value;
        const subId = document.getElementById("subjectSelectMark").value;
        const checks = document.querySelectorAll(".att-check");
        const btn = document.getElementById("saveBtn");

        const data = Array.from(checks).map((cb) => ({
          student_id: cb.dataset.id,
          status: cb.checked ? "Present" : "Absent",
        }));

        btn.disabled = true;
        btn.innerHTML = `<i class="ri-loader-4-line ri-spin"></i> Saving...`;

        try {
          const res = await fetch("http://localhost:5000/api/attendance/mark", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              date,
              subject_id: subId,
              attendance_data: data,
            }),
          });
          if (res.ok) {
            alert("✅ Attendance saved successfully!");
            document.getElementById("attendancePanel").style.display = "none";
          }
        } catch (e) {
          alert("Error saving attendance.");
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<i class="ri-save-line"></i> Save Attendance`;
        }
      }

      /* --- TAB 2: REPORTS --- */
      async function fetchAttendanceReport() {
        const subId = document.getElementById("subjectSelectReport").value;
        const timeframe = document.getElementById("timeFilter").value;

        let url = `http://localhost:5000/api/attendance/report?filterType=${timeframe}`;
        if (subId) url += `&subject_id=${subId}`;

        try {
          const res = await fetch(url);
          const data = await res.json();

          document.getElementById("reportTbody").innerHTML = data
            .map((s) => {
              const perc = s.attendance_percentage || 0;
              const isDanger = perc < 75;
              return `
              <tr>
                <td style="color: var(--text-muted); font-weight: 700;">${s.roll_number}</td>
                <td>
                  <div class="student-cell">
                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random&size=32">
                    ${s.name} ${s.is_defaulter ? '<span class="badge-defaulter">DEFAULTER</span>' : ""}
                  </div>
                </td>
                <td style="font-weight: 600;">${s.total_present} / ${s.total_days}</td>
                <td style="font-weight: 800; color: ${isDanger ? "#ef4444" : "#10b981"}">${perc}%</td>
                <td style="text-align: right;">
                  <button class="btn-danger-outline ${s.is_defaulter ? "flagged" : ""}" onclick="toggleDefaulter(${s.student_id}, ${!s.is_defaulter})">
                    <i class="ri-flag-${s.is_defaulter ? "fill" : "line"}"></i> ${s.is_defaulter ? "Unflag" : "Flag"}
                  </button>
                </td>
              </tr>`;
            })
            .join("");
          document.getElementById("reportPanel").style.display = "block";
        } catch (e) {
          alert("Failed to load report.");
        }
      }

      async function toggleDefaulter(id, status) {
        try {
          const res = await fetch("http://localhost:5000/api/attendance/flag", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ student_id: id, flag_status: status }),
          });
          if (res.ok) fetchAttendanceReport();
        } catch (e) {
          console.error(e);
        }
      }

      function logout() {
        localStorage.removeItem("teacher");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
