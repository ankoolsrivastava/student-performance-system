<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Center | Data Entry & Reports</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --first-color: hsl(263, 64%, 48%);
        --bg-color: #f4f7fe;
        --card-bg: #ffffff;
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --border-color: #eef2f6;
        --body-font: "Inter", sans-serif;
        --error-color: #ef4444;
      }

      [data-theme="dark"] {
        --bg-color: #0b0f19;
        --card-bg: #1a1f2e;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #2a3142;
      }

      body {
        margin: 0;
        font-family: var(--body-font);
        background: var(--bg-color);
        color: var(--text-main);
        transition: 0.3s;
      }
      .layout {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }

      /* Navigation */
      .top-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }
      .btn-back {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 10px 15px;
        border-radius: 10px;
        cursor: pointer;
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        transition: 0.3s;
      }
      .btn-back:hover {
        background: var(--first-color);
        color: white;
        border-color: var(--first-color);
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
      }
      .tab-btn {
        background: none;
        border: none;
        font-family: var(--body-font);
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text-muted);
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--first-color);
        color: white;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Panels */
      .panel {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        margin-bottom: 24px;
      }
      .panel-header {
        margin: 0 0 10px 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
      }
      .panel-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 25px;
      }

      /* Form Layout */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 25px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
      }
      .input-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .input-group select,
      .input-group input {
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-color);
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
        transition: 0.2s;
        box-sizing: border-box;
      }
      .input-group select:focus,
      .input-group input:focus {
        border-color: var(--first-color);
      }

      .error-text {
        color: var(--error-color);
        font-size: 0.75rem;
        font-weight: 600;
        position: absolute;
        bottom: -20px;
        left: 0;
        display: none;
      }

      .btn-primary {
        background: var(--first-color);
        color: white;
        border: none;
        padding: 14px 24px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1rem;
        transition: 0.2s;
      }
      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.1);
        transform: translateY(-2px);
      }
      .btn-primary:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      /* Report Table */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        padding: 16px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
      }
      th {
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }

      .tag {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .tag-passing {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
      }
      .tag-risk {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }

      .student-cell {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .student-cell img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
        background: var(--bg-color);
      }

      .progress-container {
        width: 100%;
        background: var(--border-color);
        height: 8px;
        border-radius: 10px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 0.5s ease-in-out;
      }

      .report-filters {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 25px;
      }
      .filter-select {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--card-bg);
        color: var(--text-main);
        font-weight: 600;
        min-width: 150px;
        outline: none;
      }

      .search-box {
        display: flex;
        align-items: center;
        background: var(--card-bg);
        padding: 10px 15px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        min-width: 250px;
      }
      .search-box input {
        border: none;
        background: transparent;
        outline: none;
        color: var(--text-main);
        font-family: var(--body-font);
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="top-controls">
        <a href="dashboard.html" class="btn-back"
          ><i class="ri-arrow-left-line"></i> Back to Dashboard</a
        >
        <div
          style="font-size: 1.1rem; font-weight: 700; color: var(--first-color)"
        >
          <i class="ri-book-read-line"></i> Academic Center
        </div>
      </header>

      <div class="tabs">
        <button
          class="tab-btn active"
          onclick="switchTab('entryTab')"
          id="btn-entryTab"
        >
          Record Data
        </button>
        <button
          class="tab-btn"
          onclick="switchTab('reportTab')"
          id="btn-reportTab"
        >
          Performance Report
        </button>
      </div>

      <div id="entryTab" class="tab-content active">
        <div class="panel">
          <div class="panel-header">Data Entry</div>
          <p class="panel-subtitle">
            Select a category to record exam scores or assignment submissions.
          </p>

          <div class="form-grid" style="grid-template-columns: 1fr">
            <div class="input-group" style="max-width: 50%">
              <label>Data Category</label>
              <select id="categorySelect" onchange="toggleForm()">
                <option value="Marks">Marks (Exam Scores)</option>
                <option value="Assignments">Assignments (Submissions)</option>
              </select>
            </div>
          </div>

          <div id="marksForm">
            <div class="form-grid">
              <div class="input-group">
                <label>Exam Type</label>
                <select id="examTypeSelect">
                  <option value="Unit Test 1">Unit Test 1</option>
                  <option value="Unit Test 2">Unit Test 2</option>
                  <option value="End Sem">End Sem Exam</option>
                </select>
              </div>
              <div class="input-group">
                <label>Student</label
                ><select id="studentSelectMarks">
                  <option>Loading...</option>
                </select>
              </div>
              <div class="input-group">
                <label>Subject</label
                ><select id="subjectSelectMarks">
                  <option>Loading...</option>
                </select>
              </div>
              <div class="input-group">
                <label>Score (0-100) *</label>
                <input
                  type="number"
                  id="marksInput"
                  placeholder="Enter marks (0-100)"
                  min="0"
                  max="100"
                />
                <span class="error-text" id="marksError"
                  >Please enter a valid score between 0 and 100.</span
                >
              </div>
            </div>
            <button class="btn-primary" id="saveMarksBtn" onclick="saveMarks()">
              <i class="ri-save-line"></i> Commit Marks
            </button>
          </div>

          <div id="assignmentsForm" style="display: none">
            <div class="form-grid">
              <div class="input-group">
                <label>Assignment Title *</label>
                <input
                  type="text"
                  id="assignTitle"
                  placeholder="e.g. Lab Report 1"
                />
                <span class="error-text" id="assignTitleError"
                  >Title is required.</span
                >
              </div>
              <div class="input-group">
                <label>Due Date</label><input type="date" id="assignDueDate" />
              </div>
              <div class="input-group">
                <label>Student</label
                ><select id="studentSelectAssign">
                  <option>Loading...</option>
                </select>
              </div>
              <div class="input-group">
                <label>Subject</label
                ><select id="subjectSelectAssign">
                  <option>Loading...</option>
                </select>
              </div>
              <div class="input-group">
                <label>Status</label>
                <select id="assignStatus">
                  <option value="false">Pending</option>
                  <option value="true">Completed</option>
                </select>
              </div>
            </div>
            <button
              class="btn-primary"
              id="saveAssignBtn"
              onclick="saveAssignment()"
            >
              <i class="ri-file-add-line"></i> Commit Assignment
            </button>
          </div>
        </div>
      </div>

      <div id="reportTab" class="tab-content">
        <div class="panel">
          <div class="panel-header">Class Standings</div>

          <div class="report-filters">
            <div style="display: flex; gap: 10px; flex-wrap: wrap">
              <select
                id="filterExamType"
                class="filter-select"
                onchange="loadFilteredAverages()"
              >
                <option value="Unit Test 1">Unit Test 1</option>
                <option value="Unit Test 2">Unit Test 2</option>
                <option value="End Sem">End Sem Exam</option>
              </select>
              <select
                id="filterSubject"
                class="filter-select"
                onchange="loadFilteredAverages()"
              >
                <option value="">Loading subjects...</option>
              </select>
            </div>
            <div class="search-box">
              <i
                class="ri-search-line"
                style="margin-right: 8px; color: var(--text-muted)"
              ></i>
              <input
                type="text"
                id="studentSearch"
                placeholder="Search students..."
                onkeyup="filterReport()"
              />
            </div>
          </div>

          <div style="overflow-x: auto">
            <table>
              <thead>
                <tr>
                  <th>Student Identity</th>
                  <th style="width: 250px">Assignment Status</th>
                  <th style="text-align: center">Marks Obtained</th>
                  <th style="text-align: center">Mastery (Pass/Fail)</th>
                </tr>
              </thead>
              <tbody id="averagesTableBody">
                <tr>
                  <td
                    colspan="4"
                    style="
                      text-align: center;
                      padding: 40px;
                      color: var(--text-muted);
                    "
                  >
                    Select filters to view report...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let fullData = [];
      const theme = localStorage.getItem("dashboard_theme") || "light";
      document.body.setAttribute("data-theme", theme);

      function switchTab(tabId) {
        document
          .querySelectorAll(".tab-content, .tab-btn")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        document.getElementById("btn-" + tabId).classList.add("active");
        if (tabId === "reportTab") initReportFilters();
      }

      function toggleForm() {
        const category = document.getElementById("categorySelect").value;
        document.getElementById("marksForm").style.display =
          category === "Marks" ? "block" : "none";
        document.getElementById("assignmentsForm").style.display =
          category === "Assignments" ? "block" : "none";
      }

      async function loadFormData() {
        try {
          const [students, subjects] = await Promise.all([
            fetch("http://localhost:5000/api/students").then((r) => r.json()),
            fetch("http://localhost:5000/api/analysis/subjects").then((r) =>
              r.json(),
            ),
          ]);
          const studentHTML = students
            .map(
              (s) =>
                `<option value="${s.student_id}">${s.name} (${s.roll_number})</option>`,
            )
            .join("");
          const subjectHTML = subjects
            .map(
              (s) =>
                `<option value="${s.subject_id}">${s.subject_name}</option>`,
            )
            .join("");
          ["studentSelectMarks", "studentSelectAssign"].forEach(
            (id) => (document.getElementById(id).innerHTML = studentHTML),
          );
          ["subjectSelectMarks", "subjectSelectAssign"].forEach(
            (id) => (document.getElementById(id).innerHTML = subjectHTML),
          );
        } catch (e) {
          console.error("Error loading forms", e);
        }
      }

      async function saveMarks() {
        const marksInput = document.getElementById("marksInput");
        const val = parseInt(marksInput.value, 10);

        if (isNaN(val) || val < 0 || val > 100) {
          document.getElementById("marksError").style.display = "block";
          return;
        }
        document.getElementById("marksError").style.display = "none";

        const teacher = JSON.parse(localStorage.getItem("teacher") || "{}");
        const payload = {
          student_id: document.getElementById("studentSelectMarks").value,
          subject_id: document.getElementById("subjectSelectMarks").value,
          marks: val,
          exam_type: document.getElementById("examTypeSelect").value,
          teacher_id: teacher.teacher_id,
        };

        const btn = document.getElementById("saveMarksBtn");
        btn.disabled = true;
        btn.innerHTML = `<i class="ri-loader-4-line ri-spin"></i> Saving...`;

        try {
          const res = await fetch("http://localhost:5000/api/marks/upsert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (res.ok) {
            alert("✅ Marks recorded!");
            marksInput.value = "";
          }
        } catch (e) {
          alert("Connection failed!");
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<i class="ri-save-line"></i> Commit Marks`;
        }
      }

      async function saveAssignment() {
        const titleInput = document.getElementById("assignTitle");
        if (!titleInput.value.trim()) {
          document.getElementById("assignTitleError").style.display = "block";
          return;
        }
        document.getElementById("assignTitleError").style.display = "none";

        const payload = {
          student_id: document.getElementById("studentSelectAssign").value,
          subject_id: document.getElementById("subjectSelectAssign").value,
          title: titleInput.value.trim(),
          status: document.getElementById("assignStatus").value === "true",
          due_date:
            document.getElementById("assignDueDate").value ||
            new Date().toISOString().split("T")[0],
        };

        const btn = document.getElementById("saveAssignBtn");
        btn.disabled = true;
        btn.innerHTML = `<i class="ri-loader-4-line ri-spin"></i> Saving...`;

        try {
          const res = await fetch(
            "http://localhost:5000/api/assignments/upsert",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            },
          );
          if (res.ok) {
            alert("✅ Assignment recorded!");
            titleInput.value = "";
          }
        } catch (e) {
          alert("Error saving assignment");
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<i class="ri-file-add-line"></i> Commit Assignment`;
        }
      }

      /* --- PERFORMANCE REPORT LOGIC --- */
      async function initReportFilters() {
        try {
          const res = await fetch(
            "http://localhost:5000/api/analysis/subjects",
          );
          const subjects = await res.json();
          document.getElementById("filterSubject").innerHTML = subjects
            .map(
              (s) =>
                `<option value="${s.subject_id}">${s.subject_name}</option>`,
            )
            .join("");
          loadFilteredAverages();
        } catch (e) {
          console.error("Filter init failed", e);
        }
      }

      async function loadFilteredAverages() {
        const examType = document.getElementById("filterExamType").value;
        const subjectId = document.getElementById("filterSubject").value;
        if (!examType || !subjectId) return;

        document.getElementById("averagesTableBody").innerHTML =
          `<tr><td colspan="4" style="text-align:center; padding: 40px;"><i class="ri-loader-4-line ri-spin" style="font-size: 1.5rem; color: var(--first-color);"></i></td></tr>`;

        try {
          const res = await fetch(
            `http://localhost:5000/api/analysis/filtered-standings?exam_type=${examType}&subject_id=${subjectId}`,
          );
          if (!res.ok) throw new Error("API Error");
          fullData = await res.json();
          populateFilteredTable(fullData);
        } catch (e) {
          document.getElementById("averagesTableBody").innerHTML =
            `<tr><td colspan="4" style="text-align:center; color:var(--error-color);">Connection error. Ensure backend is running.</td></tr>`;
        }
      }

      function populateFilteredTable(data) {
        let html = "";
        if (data.length === 0) {
          document.getElementById("averagesTableBody").innerHTML =
            `<tr><td colspan="4" style="text-align:center; padding: 30px;">No students found for this selection.</td></tr>`;
          return;
        }

        data.forEach((s) => {
          const marks = s.academic_progress;
          const hasMarks = marks !== null && marks !== undefined;
          const isPass = hasMarks ? marks >= 40 : false;
          const masteryTag = hasMarks
            ? isPass
              ? `<span class="tag tag-passing">PASS</span>`
              : `<span class="tag tag-risk">FAIL</span>`
            : `<span style="color:var(--text-muted); font-size:0.8rem; font-weight: 600;">PENDING</span>`;

          html += `
            <tr class="student-row">
                <td>
                    <div class="student-cell">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random">
                        <div>
                            <span style="font-weight:700; display:block; color: var(--text-main);">${s.name}</span>
                            <span style="font-size:0.75rem; color:var(--text-muted); font-weight: 600;">${s.roll_number}</span>
                        </div>
                    </div>
                </td>
                <td>
                    <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:700; margin-bottom:6px; color: var(--text-muted);">
                        <span style="text-transform: uppercase;">Done: ${s.assignments_done}/${s.assignments_total}</span>
                        <span style="color: var(--text-main);">${s.assign_completion}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${s.assign_completion}%; background: ${s.assign_completion == 100 ? "#10b981" : "var(--first-color)"}"></div>
                    </div>
                </td>
                <td style="text-align:center; font-weight:800; font-size:1.1rem; color:${hasMarks && !isPass ? "var(--error-color)" : "var(--first-color)"};">
                    ${hasMarks ? marks : "-"}
                </td>
                <td style="text-align:center;">${masteryTag}</td>
            </tr>`;
        });
        document.getElementById("averagesTableBody").innerHTML = html;
      }

      function filterReport() {
        const query = document
          .getElementById("studentSearch")
          .value.toLowerCase();
        document.querySelectorAll(".student-row").forEach((row) => {
          row.style.display = row.innerText.toLowerCase().includes(query)
            ? ""
            : "none";
        });
      }

      loadFormData();
    </script>
  </body>
</html>
